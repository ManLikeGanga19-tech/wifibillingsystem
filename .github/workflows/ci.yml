name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wifi
          POSTGRES_PASSWORD: wifi
          POSTGRES_DB: wifi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wifi" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -v
        env:
          DATABASE_URL: postgres://wifi:wifi@localhost:5432/wifi
          REDIS_URL: redis://localhost:6379/0
          NOTIFICATIONS_PROVIDER: dummy
