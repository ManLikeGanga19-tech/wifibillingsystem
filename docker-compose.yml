name: wifi-billing

x-backend: &backend
  build: ./backend
  volumes:
    - ./backend:/app
  environment: &backend-env
    DJANGO_SETTINGS_MODULE: config.settings.dev
    DATABASE_URL: postgres://wifi:wifi@db:5432/wifi
    REDIS_URL: redis://redis:6379/0
    DARAJA_CONSUMER_KEY: ${DARAJA_CONSUMER_KEY:-}
    DARAJA_CONSUMER_SECRET: ${DARAJA_CONSUMER_SECRET:-}
    DARAJA_SHORTCODE: ${DARAJA_SHORTCODE:-}
    DARAJA_PASSKEY: ${DARAJA_PASSKEY:-}
    FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
    DARAJA_CALLBACK_BASE_URL: ${DARAJA_CALLBACK_BASE_URL:-https://example.invalid}
    DARAJA_CALLBACK_TOKEN: ${DARAJA_CALLBACK_TOKEN:-dev-callback-token}
    AT_API_KEY: ${AT_API_KEY:-}
    NOTIFICATIONS_PROVIDER: ${NOTIFICATIONS_PROVIDER:-dummy}
    # Real SMTP, into a mailbox that cannot reach a human. This exercises the ACTUAL
    # send path — Celery task, SMTP handshake, headers, subject, body — which the
    # console backend never did; it just printed to stdout and hid delivery bugs.
    EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
    EMAIL_HOST: ${EMAIL_HOST:-mailpit}
    EMAIL_PORT: ${EMAIL_PORT:-1025}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS:-0}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-WIFI.OS <noreply@wifios.co.ke>}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    mailpit:
      condition: service_started

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wifi
      POSTGRES_PASSWORD: wifi
      POSTGRES_DB: wifi
    # Exposed for local DB tools (DBeaver). Dev only — never expose in production.
    # 5434 on the host: 5432 and 5433 are taken by other local Postgres/WSL services.
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wifi"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The dev/staging mailbox. Speaks real SMTP on 1025 and SWALLOWS EVERYTHING — no
  # message can escape to an actual person. Read them at http://localhost:8025.
  #
  # This belongs on STAGING too, and that is the point of it. A staging box wired to a
  # real SMTP provider will cheerfully post invoices and suspension notices to the real
  # email addresses sitting in its copy of the data. Mailpit is what stands between a
  # test run and an ISP's inbox.
  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "8025:8025" # web inbox
      - "1025:1025" # SMTP

  api:
    <<: *backend
    command: sh -c "python manage.py migrate && python manage.py seed_dev && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"

  worker:
    <<: *backend
    command: celery -A config worker -l info

  beat:
    <<: *backend
    command: celery -A config beat -l info

  # ---- frontends -------------------------------------------------------------------
  #
  # All four SPAs run in Docker too, so `docker compose up` gives a fully working dev
  # system with nothing to start by hand. Each mounts its source for live reload, but
  # keeps its node_modules in a NAMED VOLUME — the host's node_modules is built for
  # Windows and its esbuild/rollup binaries won't run in a Linux container, so it must
  # not shadow the container's own install. `npm install` on start is a fast no-op once
  # the volume is populated.
  #
  # They reach Django at http://api:8000 (the compose network), not localhost — see the
  # API_PROXY_TARGET the Vite/Astro configs read.
  admin-ui:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      API_PROXY_TARGET: http://api:8000
    volumes:
      - ./admin-ui:/app
      - admin_ui_modules:/app/node_modules
    ports:
      - "4600:4600"
    depends_on: [api]

  portal:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      API_PROXY_TARGET: http://api:8000
    volumes:
      - ./portal:/app
      - portal_modules:/app/node_modules
    ports:
      - "4700:4700"
    depends_on: [api]

  super-admin:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      API_PROXY_TARGET: http://api:8000
    volumes:
      - ./super-admin:/app
      - super_admin_modules:/app/node_modules
    ports:
      - "4800:4800"
    depends_on: [api]

  marketing:
    image: node:22-alpine
    working_dir: /app
    # Astro needs --host to be reachable from outside the container; API_ORIGIN is the
    # signup proxy target (read by astro.config.mjs).
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      API_ORIGIN: http://api:8000
    volumes:
      - ./marketing:/app
      - marketing_modules:/app/node_modules
    ports:
      - "4900:4900"
    depends_on: [api]

volumes:
  pgdata:
  admin_ui_modules:
  portal_modules:
  super_admin_modules:
  marketing_modules:
