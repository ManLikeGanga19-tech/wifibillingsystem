        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        mpesa_receipt:
          type: string
          maxLength: 30
        result_desc:
          type: string
          maxLength: 255
        session_active:
