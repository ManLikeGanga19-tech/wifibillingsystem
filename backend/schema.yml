components:
  schemas:
    AudienceEnum:
      enum:
      - all
      - active
      - expired
      type: string
      description: |-
        * `all` - All clients
        * `active` - Clients with an active session
        * `expired` - Clients whose sessions have expired
    Campaign:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        channel:
          $ref: '#/components/schemas/ChannelEnum'
        audience:
          $ref: '#/components/schemas/AudienceEnum'
        body:
          type: string
          maxLength: 480
        status:
          allOf:
          - $ref: '#/components/schemas/CampaignStatusEnum'
          readOnly: true
        total_recipients:
          type: integer
          readOnly: true
        sent_count:
          type: integer
          readOnly: true
        failed_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - body
      - created_at
      - failed_count
      - id
      - name
      - sent_count
      - status
      - total_recipients
    CampaignStatusEnum:
      enum:
      - queued
      - sending
      - done
      type: string
      description: |-
        * `queued` - Queued
        * `sending` - Sending
        * `done` - Done
    ChannelEnum:
      enum:
      - sms
      - whatsapp
      type: string
      description: |-
        * `sms` - SMS
        * `whatsapp` - WhatsApp
    Message:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        campaign:
          type: integer
          nullable: true
        to_phone:
          type: string
          maxLength: 12
        channel:
          $ref: '#/components/schemas/ChannelEnum'
        body:
          type: string
          maxLength: 480
        status:
          $ref: '#/components/schemas/MessageStatusEnum'
        provider_ref:
          type: string
          maxLength: 100
        error:
          type: string
          maxLength: 255
        sent_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - body
      - created_at
      - id
      - to_phone
    MessageStatusEnum:
      enum:
      - queued
      - sent
      - failed
      type: string
      description: |-
        * `queued` - Queued
        * `sent` - Sent
        * `failed` - Failed
    PaginatedCampaignList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Campaign'
    PaginatedMessageList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    PaginatedPlanList:
